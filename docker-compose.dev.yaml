name: hardwaretech

services:
  backend-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: hardwaretech-api-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.development
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    volumes:
      - ./uploads:/app/uploads
    networks:
      - backend-network
      - hardwaretech-network 
    depends_on:
      mysql-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mysql-dev:
    image: mysql:8.0
    container_name: hardwaretech-mysql-dev
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=H@RDW@RETECH123
      - MYSQL_DATABASE=db_hardwaretech_local
      - MYSQL_ROOT_HOST=%
    volumes:
      - mysql-dev-data:/var/lib/mysql
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pH@RDW@RETECH123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0

  redis-dev:
    image: redis:7-alpine
    container_name: hardwaretech-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    networks:
      - backend-network
      - hardwaretech-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  backend-network:
    driver: bridge
  hardwaretech-network:
    external: true

volumes:
  mysql-dev-data:
    driver: local
  redis-dev-data:
    driver: local
  uploads:
    driver: local