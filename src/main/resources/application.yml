spring:
  config:
    import: optional:file:.env.development[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${CACHE_HOST}
      port: ${CACHE_PORT}
  cache:
    type: redis

api:
  security:
    token:
      secret: sptech

gemini:
  api:
    key: ${GEMINI_API_KEY}
    url: ${GEMINI_API_URL}
brevo:
  key: ${BREVO_API_KEY}
  url: ${BREVO_API_URL}
server:
  servlet:
    context-path: /api


broker:
    order:
      command:
        exchange: ${ORDER_CREATE_EXCHANGE}
        queue: ${ORDER_CREATE_QUEUE}
        routing-key: ${ORDER_ROUTING_KEY}
        dlx: ${ORDER_DLX}
        dlq: ${ORDER_DLQ}
      event:
        exchange: ${ORDER_CREATED_EXCHANGE}
        queue: ${ORDER_CREATED_QUEUE}
        routing-key: ${ORDER_CREATED_ROUTING_KEY}
        dlx: ${ORDER_CREATED_DLX}
        dlq: ${ORDER_CREATED_DLQ}